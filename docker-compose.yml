version: '3.9'

services:
  backend:
    build: ./backend
    container_name: cloud-ide-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - workspaces:/workspaces
    environment:
      - WORKSPACE_BASE=/workspaces
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:80
      - PORT=8000
    env_file:
      - backend/.env
    restart: unless-stopped
    networks:
      - ide-net

  frontend:
    build:
      context: ./frontend
      args:
        # Empty = same origin; nginx proxies /api (incl. WebSockets) to the backend.
        # This works whether you open the IDE on localhost or a remote server IP.
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: cloud-ide-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ide-net

volumes:
  workspaces:

networks:
  ide-net:
    driver: bridge
